# ===========================
# NoteFlow — GitHub Actions CI/CD
# ===========================

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/medaminenj/kamka-assessment/backend
  FRONTEND_IMAGE: ghcr.io/medaminenj/kamka-assessment/frontend

jobs:

  # ===========================
  # TEST
  # ===========================
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: cd backend && mvn test -q

  # ===========================
  # BUILD & PUSH IMAGES
  # ===========================
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: test-backend
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

  # ===========================
  # DEPLOY TO RENDER
  # ===========================
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Render backend deploy
        run: |
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}"
          echo "Backend deploy triggered"

      - name: Trigger Render frontend deploy
        run: |
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}"
          echo "Frontend deploy triggered"
