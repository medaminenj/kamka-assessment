# ===========================
# NoteFlow - Local Dev Config (XAMPP)
# ===========================

spring.datasource.url=jdbc:mysql://localhost:3306/noteflow?createDatabaseIfNotExist=true&useUnicode=true&useLegacyDatetimeCode=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# App name
spring.application.name=noteflow

# Server port
server.port=8080

# ===========================
# Actuator (health + metrics)
# ===========================
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true

# ===========================
# CORS - allow Angular dev server
# ===========================
app.cors.allowed-origins=http://localhost:4200
