# ===========================
# NoteFlow - application config
# reads from environment variables
# ===========================
spring.application.name=noteflow
server.port=${SERVER_PORT:8080}

# Database — injected via env vars
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
# dialect auto-detected based on driver (MySQL locally, PostgreSQL on Render)

# Actuator
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}
